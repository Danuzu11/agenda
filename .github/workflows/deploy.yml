name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          missing=0
          if [ -z "$GOOGLE_API_KEY" ]; then echo "::error::Falta secret GOOGLE_API_KEY"; missing=1; fi
          if [ -z "$GOOGLE_CLIENT_ID" ]; then echo "::error::Falta secret GOOGLE_CLIENT_ID"; missing=1; fi
          if [ -z "$GOOGLE_SHEET_ID" ]; then echo "::error::Falta secret GOOGLE_SHEET_ID"; missing=1; fi
          if [ "$missing" -eq 1 ]; then exit 1; fi

      - name: Build
        run: npm run build
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      - name: Verify config.js
        run: |
          test -f dist/js/config.js || (echo "dist/js/config.js no existe" && exit 1)
          grep -q 'clientId: "' dist/js/config.js || exit 1
          grep -q 'clientId: ""' dist/js/config.js && (echo "clientId vacío en config.js" && cat dist/js/config.js && exit 1) || true

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
